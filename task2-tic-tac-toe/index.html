<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic-Tac-Toe</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="app">

    <header>
      <h1>Tic<span>-Tac-</span>Toe</h1>
      <p class="tagline">First to three in a row wins.</p>
    </header>

    <!-- Mode selector -->
    <div class="mode-selector" id="modeSelector">
      <button class="mode-btn active" data-mode="pvp">👥 2 Players</button>
      <button class="mode-btn" data-mode="ai">🤖 vs AI</button>
    </div>

    <!-- Scoreboard -->
    <div class="scoreboard">
      <div class="score-box" id="scoreX">
        <div class="score-label">Player X</div>
        <div class="score-num" id="xScore">0</div>
      </div>
      <div class="score-box draw">
        <div class="score-label">Draws</div>
        <div class="score-num" id="drawScore">0</div>
      </div>
      <div class="score-box" id="scoreO">
        <div class="score-label" id="oLabel">Player O</div>
        <div class="score-num" id="oScore">0</div>
      </div>
    </div>

    <!-- Status -->
    <div class="status" id="status">Player X's turn</div>

    <!-- Board -->
    <div class="board" id="board">
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn-reset" id="resetBtn">New Game</button>
      <button class="btn-clear" id="clearBtn">Reset Scores</button>
    </div>

  </div>

  <!-- Win overlay -->
  <div class="overlay hidden" id="overlay">
    <div class="overlay-card">
      <div class="overlay-emoji" id="overlayEmoji">🎉</div>
      <div class="overlay-title" id="overlayTitle">Player X Wins!</div>
      <button class="btn-reset" id="overlayBtn">Play Again</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
